services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: maxjs
      POSTGRES_USER: maxjs
      POSTGRES_DB: maxjs
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maxjs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data: